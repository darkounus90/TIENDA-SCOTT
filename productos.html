<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explora nuestro catálogo completo de bicicletas Scott y repuestos automotrices. Encuentra la mejor calidad en El Pedalazo.">
  <title>Catálogo de Productos | Grupo Empresarial El Pedalazo</title>
  
  <link rel="stylesheet" href="style.css?v=2.0.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="products-page">
  <!-- Header (Same as index.html) -->
  <header class="header">
    <div class="container header__content">
      <div class="header__logo">
        <a href="index.html">
          <span style="font-size: 1.5rem; font-weight: 800; color: white;">El Pedalazo</span>
        </a>
      </div>

      <nav class="nav" id="mainNav">
        <a href="index.html">Inicio</a>
        <a href="index.html#categorias">Categorías</a>
        <a href="productos.html" class="active">Productos</a>
        <a href="cars.html" class="nav-highlight">
          Para tu carro!
          <span class="nav-badge">NEW</span>
        </a>
        <a href="index.html#servicios">Servicios</a>
        <a href="index.html#contacto">Contacto</a>
      </nav>

      <div class="header__actions">
        <div class="search-wrapper">
          <i data-lucide="search"></i>
          <input type="text" id="searchInput" placeholder="Buscar productos...">
        </div>
        
        <button class="icon-btn" id="accountButton" title="Mi Cuenta">
          <i data-lucide="user"></i>
        </button>
        
        <button class="icon-btn cart-btn" id="cartButton">
          <i data-lucide="shopping-bag"></i>
          <span class="cart-count" id="cartCount">0</span>
        </button>

        <button class="hamburger" id="hamburgerMenu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="container" style="padding-top: 120px; padding-bottom: 60px;">
    <section id="productos">
      <div class="section-header">
        <div class="section-title">
          <span class="badge">Catálogo</span>
          <h2>Nuestros Productos</h2>
        </div>
        <div class="filter-wrapper">
          <select id="categoryFilter">
            <option value="all">Todas las categorías</option>
            <option value="MTB">MTB</option>
            <option value="RUTA">Ruta</option>
            <option value="URBANA">Urbana</option>
            <option value="AUTOMOTRIZ">Automotriz</option>
            <option value="ACCESORIOS">Accesorios</option>
          </select>
        </div>
      </div>

      <div class="productos__grid" id="productList">
        <!-- JS Populated -->
      </div>
    </section>
  </main>

  <!-- Footer (Simplified from index.html) -->
  <footer class="footer">
    <div class="container footer__content">
      <div class="footer__brand">
        <img src="logo-pedalazo-completo.svg" alt="El Pedalazo" style="height: 40px; margin-bottom: 1rem;">
        <p>Tu pasión por el pedal y el motor en un solo lugar.</p>
      </div>
      <div class="footer__links">
        <h4>Enlaces</h4>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="productos.html">Productos</a></li>
          <li><a href="privacidad.html">Privacidad</a></li>
        </ul>
      </div>
    </div>
    <div class="footer__bottom">
      <p>&copy; 2026 Grupo Empresarial El Pedalazo. Todos los derechos reservados.</p>
    </div>
  </footer>

  <!-- Login/Cart Modals (Will be handled by app.js if elements match) -->
  <div class="cart-modal" id="cartModal"></div>
  <div class="cart-modal" id="loginModal"></div>
  <div class="cart-modal" id="registerModal"></div>
  <div class="cart-modal" id="accountModal"></div>

  <!-- Scripts -->
  <script src="app.js" type="module"></script>
</body>

</html>
